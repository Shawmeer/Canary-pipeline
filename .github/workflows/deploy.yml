name: Deploy to EC2
# Optimized CI/CD Pipeline with Canary Support

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging
      - promote-canary
      - rollback

# Concurrency control to prevent overlapping deploys
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

# Branch configuration mapping
jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      container_name: ${{ steps.env.outputs.container_name }}
      port: ${{ steps.env.outputs.port }}
      environment: ${{ steps.env.outputs.environment }}
      source_tag: ${{ steps.env.outputs.source_tag }}
      is_canary: ${{ steps.env.outputs.is_canary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

      - name: Set environment variables
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          
          case "$BRANCH" in
            main)
              echo "image_tag=latest" >> $GITHUB_OUTPUT
              echo "container_name=app-prod" >> $GITHUB_OUTPUT
              echo "port=3000" >> $GITHUB_OUTPUT
              echo "environment=production" >> $GITHUB_OUTPUT
              echo "source_tag=staging" >> $GITHUB_OUTPUT
              echo "is_canary=true" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "image_tag=staging" >> $GITHUB_OUTPUT
              echo "container_name=app-staging" >> $GITHUB_OUTPUT
              echo "port=3001" >> $GITHUB_OUTPUT
              echo "environment=staging" >> $GITHUB_OUTPUT
              echo "source_tag=dev" >> $GITHUB_OUTPUT
              echo "is_canary=false" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "image_tag=dev" >> $GITHUB_OUTPUT
              echo "container_name=app-dev" >> $GITHUB_OUTPUT
              echo "port=3002" >> $GITHUB_OUTPUT
              echo "environment=development" >> $GITHUB_OUTPUT
              echo "source_tag=" >> $GITHUB_OUTPUT
              echo "is_canary=false" >> $GITHUB_OUTPUT
              ;;
          esac

  # Security Scan Job - runs AFTER build (single scan, best practice)
  security-scan:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Pull and Scan Image
        run: |
          docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}

      - name: Run Trivy Scanner on Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job
  build-and-push:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Deploy Job (reusable for staging/dev/production) - OPTIMIZED
  deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.is_canary != 'true'
    environment:
      name: ${{ needs.get-version.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Upload scripts to EC2
        run: |
          # Upload deploy scripts to EC2
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem \
            scripts/deploy.sh scripts/monitor-canary.sh scripts/update-canary-weight.sh \
            ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/
          
          # Make scripts executable
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@${{ secrets.EC2_IP }} \
            "chmod +x /home/ubuntu/*.sh"

      - name: Deploy to EC2 (SINGLE SSH SESSION)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          ENV: ${{ needs.get-version.outputs.environment }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPO: ${{ env.ECR_REPO }}
        run: |
          # OPTIMIZATION 1: Single SSH session with heredoc (30-40% faster)
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e

            # ECR Login
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull image
            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

            # Deploy using reusable script
            bash /home/ubuntu/deploy.sh $CONTAINER $PORT $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ENV $GIT_SHA

            # Verify
            docker ps | grep app-
          EOF

      - name: Health Check (OPTIMIZED with curl --retry)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
        run: |
          # OPTIMIZATION 7: Use curl --retry instead of manual loop
          curl --retry 5 --retry-delay 2 --fail "http://$EC2_IP:$PORT/health" \
            && echo "✅ Deployment successful!" \
            || (echo "❌ Health check failed!" && exit 1)

  # Canary Deploy Job - OPTIMIZED (monitoring moved to background)
  canary-deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.is_canary == 'true'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Upload scripts to EC2
        run: |
          # Upload deploy scripts to EC2
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem \
            scripts/deploy.sh scripts/monitor-canary.sh scripts/update-canary-weight.sh \
            ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/
          
          # Make scripts executable
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@${{ secrets.EC2_IP }} \
            "chmod +x /home/ubuntu/*.sh"

      - name: Deploy Canary (SINGLE SSH SESSION)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPO: ${{ env.ECR_REPO }}
        run: |
          # OPTIMIZATION 1: Single SSH session for canary deployment
          # OPTIMIZATION 3: Uses reusable deploy.sh script
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e

            # ECR Login
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull image
            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

            # Deploy canary using reusable script (port 3003)
            bash /home/ubuntu/deploy.sh app-canary 3003 $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG canary $GIT_SHA

            # Verify both are running
            docker ps | grep -E 'app-|CONTAINER'
          EOF

      - name: Quick Health Check
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          # OPTIMIZATION 7: Use curl with retry for health checks
          echo "Checking canary health..."
          curl --retry 3 --retry-delay 2 --fail "http://$EC2_IP:3003/health" || exit 1
          
          echo "Checking production health..."
          curl --retry 3 --retry-delay 2 --fail "http://$EC2_IP:3000/health" || exit 1
          
          echo "✅ Both canary and production are healthy!"

      - name: Trigger Canary Monitoring (BACKGROUND - OPTIMIZATION 2)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPO: ${{ env.ECR_REPO }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          ENV: ${{ needs.get-version.outputs.environment }}
        run: |
          # OPTIMIZATION 2: Move monitoring OUT of pipeline
          # Pipeline finishes in 2-3 min instead of 10 min
          echo "Starting background canary monitor on EC2..."
          
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << EOF
            set -e
            
            # Trigger background monitoring (nohup)
            nohup bash /home/ubuntu/monitor-canary.sh \
              $EC2_IP \
              $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
              $CONTAINER \
              $PORT \
              $ENV \
              $GIT_SHA \
              > /home/ubuntu/canary-monitor.log 2>&1 &
            
            echo "Monitor started in background. Pipeline exiting."
            echo "Check /home/ubuntu/canary-monitor.log for progress."
          EOF
          
          echo "✅ Canary deployed. Monitoring continues in background on EC2."
          echo "📝 Monitor progress: ssh and check /home/ubuntu/canary-monitor.log"

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Rolling back canary..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@${{ secrets.EC2_IP }} \
            "docker stop app-canary || true; docker rm app-canary || true"
          echo "Canary rolled back."

  # Manual Promote Job
  promote-canary:
    runs-on: ubuntu-latest
    needs: [get-version]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'promote-canary'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Upload scripts to EC2
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem \
            scripts/deploy.sh scripts/monitor-canary.sh scripts/update-canary-weight.sh \
            ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@${{ secrets.EC2_IP }} \
            "chmod +x /home/ubuntu/*.sh"

      - name: Promote (SINGLE SSH SESSION)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ENV: ${{ needs.get-version.outputs.environment }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPO: ${{ env.ECR_REPO }}
        run: |
          # OPTIMIZATION 1: Single SSH session for promotion
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << EOF
            set -e

            # Stop old production and canary
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true
            
            docker stop app-canary || true
            docker rm app-canary || true

            # Deploy new version to production using reusable script
            bash /home/ubuntu/deploy.sh $CONTAINER $PORT $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ENV $GIT_SHA

            # Reload nginx
            sudo systemctl reload nginx

            # Verify
            docker ps --filter 'name=app-'
          EOF
          echo "🎉 Manual promotion complete!"

  # Rollback Job
  rollback:
    runs-on: ubuntu-latest
    needs: [get-version]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Upload scripts to EC2
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem \
            scripts/deploy.sh scripts/monitor-canary.sh scripts/update-canary-weight.sh \
            ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@${{ secrets.EC2_IP }} \
            "chmod +x /home/ubuntu/*.sh"

      - name: Rollback (SINGLE SSH SESSION)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
        run: |
          # OPTIMIZATION 1: Single SSH session for rollback
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e
            
            # Stop and remove canary, restart production
            docker stop app-canary || true
            docker rm app-canary || true
            docker start $CONTAINER || true
            
            # Reload nginx to remove canary from traffic
            sudo systemctl reload nginx || true
          EOF
          echo "Rollback complete."

  # Slack Notification
  notify:
    runs-on: ubuntu-latest
    needs: [get-version, deploy, canary-deploy]
    if: always()
    steps:
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK
        run: |
          STATUS="${{ job.status }}"
          BRANCH="${{ needs.get-version.outputs.branch }}"
          ENV="${{ needs.get-version.outputs.environment }}"
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deployment $STATUS to $ENV ($BRANCH)\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
