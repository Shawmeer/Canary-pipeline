name: Deploy to EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EC2_IP: ${{ secrets.EC2_IP }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || (echo "Missing secret: AWS_ACCESS_KEY_ID" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "Missing secret: AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "$EC2_IP" || (echo "Missing secret: EC2_IP" && exit 1)
          test -n "$EC2_SSH_KEY" || (echo "Missing secret: EC2_SSH_KEY" && exit 1)

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -f dockerfile -t ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Prepare SSH key
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          printf '%s\n' "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:latest
            docker stop app || true
            docker rm app || true
            docker run -d \
              --restart always \
              -p 80:3000 \
              --name app \
              317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:latest
            EOF

      - name: Verify Deployment
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep app"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK is not set. Skipping notification."
            exit 0
          fi

          if [ ${{ job.status }} == 'success' ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deployment $STATUS for $GITHUB_REPOSITORY on branch $GITHUB_REF\"}" \
            $SLACK_WEBHOOK
