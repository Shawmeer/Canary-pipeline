name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPO: devops-app-repo


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com/${{ env.ECR_REPO }}

      - name: Build Image
        run: docker build -t $ECR_REPO .

      - name: Tag Image
        run: docker tag $ECR_REPO:latest 317287357166.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:latest

      - name: Push to ECR
        run: docker push 317287357166.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:latest

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/private_key.pem ubuntu@$EC2_IP "
            sudo apt update -y && sudo apt upgrade -y 
            sudo apt install docker.io -y &&
            sudo systemctl start docker &&
            sudo systemctl enable docker &&
            sudo usermod -aG docker ubuntu &&
            sudo docker pull 317287357166.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:latest &&
            sudo docker stop app || true &&
            sudo docker rm app || true &&
            sudo docker run -d -p 80:3000 --name app 317287357166.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:latest
          "
