name: Deploy to EC2
# CI/CD Pipeline for DevOps Project - Deploys to EC2 with canary support

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging
      - promote-canary
      - rollback

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
      # Environment mapping
      image_tag: ${{ steps.env.outputs.image_tag }}
      container_name: ${{ steps.env.outputs.container_name }}
      port: ${{ steps.env.outputs.port }}
      environment: ${{ steps.env.outputs.environment }}
      source_tag: ${{ steps.env.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

      - name: Set environment variables
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          
          case "$BRANCH" in
            main)
              echo "image_tag=latest" >> $GITHUB_OUTPUT
              echo "container_name=app-prod" >> $GITHUB_OUTPUT
              echo "port=3000" >> $GITHUB_OUTPUT
              echo "environment=production" >> $GITHUB_OUTPUT
              echo "source_tag=staging" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "image_tag=staging" >> $GITHUB_OUTPUT
              echo "container_name=app-staging" >> $GITHUB_OUTPUT
              echo "port=3001" >> $GITHUB_OUTPUT
              echo "environment=staging" >> $GITHUB_OUTPUT
              echo "source_tag=dev" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "image_tag=dev" >> $GITHUB_OUTPUT
              echo "container_name=app-dev" >> $GITHUB_OUTPUT
              echo "port=3002" >> $GITHUB_OUTPUT
              echo "environment=development" >> $GITHUB_OUTPUT
              echo "source_tag=" >> $GITHUB_OUTPUT
              ;;
          esac

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      scan-passed: ${{ steps.trivy.outputs.scan-passed }}
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.get-version.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      # Build or pull image for scanning
      - name: Prepare Image for Scan
        run: |
          BRANCH="${{ needs.get-version.outputs.branch }}"
          GIT_SHA="${{ env.GIT_SHA }}"
          SOURCE_TAG="${{ env.SOURCE_TAG }}"
          
          if [ -z "$SOURCE_TAG" ]; then
            # Build for dev (no source)
            docker build -t ${{ env.ECR_REPO }}:dev .
          else
            # Pull promoted image for staging/prod - try multiple tags
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG && \
            docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA || \
            echo "Image not ready for scanning, skipping..."
          fi

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        id: trivy
        continue-on-error: true

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job with Image Promotion
  build-and-push:
    runs-on: ubuntu-latest
    needs: [get-version, security-scan]
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.get-version.outputs.source_tag }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push with GitHub Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create Deployment Info
        run: |
          cat > deployment-info.json << EOF
          {
            "git_sha": "${{ needs.get-version.outputs.git_sha }}",
            "git_short": "${{ needs.get-version.outputs.git_short }}",
            "branch": "${{ needs.get-version.outputs.branch }}",
            "image_tag": "${{ needs.get-version.outputs.image_tag }}",
            "ecr_repo": "${{ env.ECR_REPO }}",
            "image_url": "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.get-version.outputs.image_tag }}"
          }
          EOF

      - name: Upload Deployment Info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ needs.get-version.outputs.branch }}
          path: deployment-info.json
          retention-days: 30

  # Canary Deployment Job (RUNS FIRST for main branch)
  # Deploys new version to canary port (3003) while old version stays on production (3000)
  # This creates true 90% old / 10% new canary split
  canary-deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.branch == 'main'
    environment:
      name: production
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Canary Container
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

          echo "Deploying CANARY first (new version on port 3003)..."
          echo "Production (port 3000) keeps running with OLD version for 90% traffic"

          # Deploy canary container on port 3003 (NEW version)
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo bash -c '
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com && \
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG && \
            docker stop app-canary || true && \
            docker rm app-canary || true && \
            docker run -d --restart always -p 3003:3000 \
              -e ENVIRONMENT=canary \
              -e VERSION=$IMAGE_TAG \
              -e GIT_SHA=$GIT_SHA \
              --name app-canary \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG'"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep canary"

      - name: Wait for Canary to Start
        run: sleep 10

      - name: Verify Canary Health
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          echo "Checking canary health..."
          
          # Check canary health endpoint (NEW version on port 3003)
          CANARY_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:3003/health || echo "000")
          echo "Canary (new) health response: $CANARY_RESPONSE"
          
          # Check production health (OLD version on port 3000)
          PROD_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:3000/health || echo "000")
          echo "Production (old) health response: $PROD_RESPONSE"
          
          # Fail if canary is unhealthy
          if [ "$CANARY_RESPONSE" != "200" ]; then
            echo "ERROR: Canary health check failed!"
            exit 1
          fi
          
          if [ "$PROD_RESPONSE" != "200" ]; then
            echo "WARNING: Production health check failed!"
          fi
          
          echo "✅ Canary health check passed!"
          echo "📊 Traffic now: 90% OLD (port 3000) / 10% NEW (port 3003)"

      - name: Check Canary Latency
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          echo "Checking canary latency..."
          
          # Check canary response time
          START_TIME=$(date +%s%N)
          curl -s http://$EC2_IP:3003/ > /dev/null
          END_TIME=$(date +%s%N)
          CANARY_LATENCY=$(( (END_TIME - START_TIME) / 1000000 )) || CANARY_LATENCY=0
          echo "Canary latency: ${CANARY_LATENCY}ms"
          
          # Check production response time for comparison
          START_TIME=$(date +%s%N)
          curl -s http://$EC2_IP:3000/ > /dev/null
          END_TIME=$(date +%s%N)
          PROD_LATENCY=$(( (END_TIME - START_TIME) / 1000000 )) || PROD_LATENCY=0
          echo "Production latency: ${PROD_LATENCY}ms"
          
          # Fail if canary latency is too high (> 2x production)
          if [ $CANARY_LATENCY -gt $((PROD_LATENCY * 2)) ] && [ $PROD_LATENCY -gt 0 ]; then
            echo "ERROR: Canary latency too high!"
            exit 1
          fi
          
          echo "Canary monitoring passed!"

      - name: Canary Verified - Ready for Promotion
        if: success()
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          echo "✅ Canary verified and running!"
          echo "📊 Current traffic split:"
          echo "   - 90% → Production (port 3000) - OLD version"
          echo "   - 10% → Canary (port 3003) - NEW version"
          echo ""
          echo "To promote to 100%: Send 'promote-canary' dispatch event"
          echo "To rollback: Just let it be - old version still running"

      - name: Rollback Canary on Failure
        if: failure()
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "ROLLBACK: Stopping canary container due to health check failure..."
          
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo docker stop app-canary || true; sudo docker rm app-canary || true"
          
          echo "Canary rolled back. Production continues running on port 3000."

  # Promote Job - Only runs AFTER canary passes (manual trigger)
  # This is where new version goes to 100%
  promote-canary:
    runs-on: ubuntu-latest
    needs: [get-version, canary-deploy]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'promote-canary'
    environment:
      name: production
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      VERSION: ${{ needs.get-version.outputs.image_tag }}
      ENV_NAME: ${{ needs.get-version.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save SSH key
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Promote Canary to 100% Production
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          CONTAINER_NAME: ${{ needs.get-version.outputs.container_name }}
          PORT: ${{ needs.get-version.outputs.port }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
        run: |
          echo "Promoting canary to 100% production..."
          
          # Step 1: Stop old production container (old version)
          echo "Stopping old production container..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop \$CONTAINER_NAME || true"
          
          # Step 2: Remove old container
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker rm \$CONTAINER_NAME || true"
          
          # Step 3: Stop canary container
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop app-canary || true"
          
          # Step 4: Remove canary
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker rm app-canary || true"
          
          # Step 5: Start new version as production on port 3000
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=$ENV_NAME \
              -e VERSION=$VERSION \
              -e GIT_SHA=$GIT_SHA \
              --name \$CONTAINER_NAME \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG"
          
          # Step 6: Reload nginx
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo systemctl reload nginx"
          
          sleep 3
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep app"
          
          echo "🎉 PROMOTION COMPLETE! 100% traffic now on new version!"

      - name: Rollback on Failure
        if: failure()
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "ROLLBACK: Promotion failed. Restarting old production..."
          
          # Restart old container if it exists
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker start $CONTAINER_NAME || true"
          
          echo "Rolled back to old version."

  # Deploy Job (for staging/dev - NOT main branch)
  # Main branch uses canary-deploy + promote workflow instead
  deploy-staging-dev:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.branch != 'main'
    environment:
      name: ${{ needs.get-version.outputs.environment }}
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      VERSION: ${{ needs.get-version.outputs.image_tag }}
      ENV_NAME: ${{ needs.get-version.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          CONTAINER_NAME: ${{ needs.get-version.outputs.container_name }}
          PORT: ${{ needs.get-version.outputs.port }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

          echo "Deploying to $ENV_NAME on port $PORT..."

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop \$CONTAINER_NAME || true; docker rm \$CONTAINER_NAME || true"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=$ENV_NAME \
              -e VERSION=$VERSION \
              -e GIT_SHA=$GIT_SHA \
              --name \$CONTAINER_NAME \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG"

          sleep 3
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps"

      - name: Verify Deployment
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
        run: |
          sleep 5
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:$PORT/health || echo "000")
          echo "Health check: $HEALTH_CHECK"
          if [ "$HEALTH_CHECK" != "200" ]; then
            echo "ERROR: Health check failed!"
            exit 1
          fi
          echo "Deployment successful!"

  # Rollback Job
  rollback:
    runs-on: ubuntu-latest
    needs: [get-version]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'rollback'
    env:
      EC2_IP: ${{ secrets.EC2_IP }}
      PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
      CONTAINER_NAME: ${{ needs.get-version.outputs.container_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save SSH key
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Rollback
        run: |
          echo "Rolling back to previous version..."
          
          # Remove canary
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop app-canary || true; docker rm app-canary || true"
          
          # Restart production if stopped
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker start \$CONTAINER_NAME || true"
          
          echo "Rolled back."
          chmod 600 /tmp/private_key.pem

          # Deploy canary container on port 3003
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo bash -c ' \
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com && \
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG && \
            docker stop app-canary || true && \
            docker rm app-canary || true && \
            docker run -d --restart always -p 3003:3000 \
              -e ENVIRONMENT=canary \
              -e VERSION=$IMAGE_TAG \
              -e GIT_SHA=$GIT_SHA \
              --name app-canary \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG'"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep canary"

      - name: Wait for Canary to Start
        run: sleep 10

      - name: Verify Canary Health
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          echo "Checking canary health..."
          
          # Check canary health endpoint
          CANARY_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:3003/health || echo "000")
          echo "Canary health response: $CANARY_RESPONSE"
          
          # Check production health for comparison
          PROD_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:3000/health || echo "000")
          echo "Production health response: $PROD_RESPONSE"
          
          # Fail if canary is unhealthy
          if [ "$CANARY_RESPONSE" != "200" ]; then
            echo "ERROR: Canary health check failed!"
            exit 1
          fi
          
          if [ "$PROD_RESPONSE" != "200" ]; then
            echo "WARNING: Production health check failed!"
          fi
          
          echo "Canary health check passed!"

      - name: Monitor Canary (Wait and Verify)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          CANARY_PERCENT: 10
          CHECK_INTERVAL: 30
          MAX_RETRIES: 3
        run: |
          echo "Monitoring canary for $CHECK_INTERVAL seconds..."
          echo "Traffic split: $CANARY_PERCENT% canary, $((100-CANARY_PERCENT))% production"
          
          # Wait and check canary metrics
          sleep $CHECK_INTERVAL
          
          # Check canary response time
          START_TIME=$(date +%s%N)
          curl -s http://$EC2_IP:3003/ > /dev/null
          END_TIME=$(date +%s%N)
          CANARY_LATENCY=$(( (END_TIME - START_TIME) / 1000000 )) || CANARY_LATENCY=0
          echo "Canary latency: ${CANARY_LATENCY}ms"
          
          # Check production response time for comparison
          START_TIME=$(date +%s%N)
          curl -s http://$EC2_IP:3000/ > /dev/null
          END_TIME=$(date +%s%N)
          PROD_LATENCY=$(( (END_TIME - START_TIME) / 1000000 )) || PROD_LATENCY=0
          echo "Production latency: ${PROD_LATENCY}ms"
          
          # Fail if canary latency is too high (> 2x production)
          if [ $CANARY_LATENCY -gt $((PROD_LATENCY * 2)) ] && [ $PROD_LATENCY -gt 0 ]; then
            echo "ERROR: Canary latency too high!"
            exit 1
          fi
          
          echo "Canary monitoring passed!"

      - name: Promote Canary to Full Production
        if: success()
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Promoting canary to full production..."
          
          # Update nginx to send 100% traffic to production (or configure for canary)
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "echo 'Canary verified! Traffic can now be routed to canary via nginx port 80 with X-Canary: 1 header'"
          
          echo "Canary promotion complete!"
          echo "To route traffic to canary, use: curl -H 'X-Canary: 1' http://$EC2_IP/"

      - name: Rollback Canary on Failure
        if: failure()
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "ROLLBACK: Stopping canary container due to health check failure..."
          
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo docker stop app-canary || true; sudo docker rm app-canary || true"
          
          echo "Canary rolled back. Production continues running on port 3000."
          
          # Notify via Slack
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"⚠️ CANARY ROLLBACK for $GITHUB_REPOSITORY\\nVersion: ${{ env.IMAGE_TAG }}\\nGit SHA: ${{ env.GIT_SHA }}\\nCanary failed health checks - rolled back\"}" \
              "${{ secrets.SLACK_WEBHOOK }}"
          fi

