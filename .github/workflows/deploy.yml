name: Deploy to EC2
# Optimized CI/CD Pipeline with Canary Support

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging
      - promote-canary
      - rollback

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

# Branch configuration mapping
jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      container_name: ${{ steps.env.outputs.container_name }}
      port: ${{ steps.env.outputs.port }}
      environment: ${{ steps.env.outputs.environment }}
      source_tag: ${{ steps.env.outputs.source_tag }}
      is_canary: ${{ steps.env.outputs.is_canary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

      - name: Set environment variables
        id: env
        run: |
          # Branch config mapping (cleaner than case statement)
          declare -A BRANCH_CONFIG=(
            [main]="image_tag=latest,port=3000,container=app-prod,env=production,source=staging,canary=true"
            [staging]="image_tag=staging,port=3001,container=app-staging,env=staging,source=dev,canary=false"
            [dev]="image_tag=dev,port=3002,container=app-dev,env=development,source=,canary=false"
          )
          
          BRANCH="${{ github.ref_name }}"
          CONFIG="${BRANCH_CONFIG[$BRANCH]}"
          
          IFS=',' read -ra PARTS <<< "$CONFIG"
          for part in "${PARTS[@]}"; do
            key="${part%%=*}"
            val="${part#*=}"
            echo "$key=$val" >> $GITHUB_OUTPUT
          done

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.get-version.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Prepare Image for Scan
        run: |
          if [ -z "$SOURCE_TAG" ]; then
            docker build -t ${{ env.ECR_REPO }}:dev .
          else
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG 2>/dev/null || echo "Image not ready, skipping..."
          fi

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job
  build-and-push:
    runs-on: ubuntu-latest
    needs: [get-version, security-scan]
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Deploy Job (reusable for staging/dev/production)
  deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.is_canary != 'true'
    environment:
      name: ${{ needs.get-version.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key (once)
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Deploy to EC2 (using HEREDOC)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          ENV: ${{ needs.get-version.outputs.environment }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e
            
            # ECR login
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com
            
            # Pull image
            docker pull 317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
            
            # Stop and remove old container
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true
            
            # Run new container
            docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=$ENV \
              -e VERSION=$IMAGE_TAG \
              -e GIT_SHA=$GIT_SHA \
              --name $CONTAINER \
              317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
              
            # Show running containers
            docker ps --filter "name=app-"
          EOF

      - name: Health Check (efficient)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
        run: |
          for i in 1 2 3; do
            if curl -sf "http://$EC2_IP:$PORT/health" > /dev/null 2>&1; then
              echo "✅ Deployment successful!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Health check failed!"
          exit 1

  # Canary Deploy Job
  canary-deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    if: needs.get-version.outputs.is_canary == 'true'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key (once)
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Deploy Canary (using HEREDOC)
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
        run: |
          echo "Deploying canary to port 3003 (new version)..."
          echo "Production on port 3000 stays running (90% traffic)"
          
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e
            
            # ECR login and pull
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 317287357166.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
            
            # Stop and remove old canary
            docker stop app-canary || true
            docker rm app-canary || true
            
            # Run canary container
            docker run -d --restart always -p 3003:3000 \
              -e ENVIRONMENT=canary \
              -e VERSION=$IMAGE_TAG \
              -e GIT_SHA=$GIT_SHA \
              --name app-canary \
              317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
              
            docker ps | grep -E "app-|CONTAINER"
          EOF

      - name: Quick Health Check
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
        run: |
          # Reduced wait time
          sleep 5
          
          # Combined health check for both
          for port in 3000 3003; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "http://$EC2_IP:$port/health" || echo "000")
            echo "Port $port health: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "❌ Health check failed on port $port"
              exit 1
            fi
          done
          echo "✅ Both canary and production are healthy!"

      - name: Monitor and Auto-Promote
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ENV: ${{ needs.get-version.outputs.environment }}
        run: |
          echo "Monitoring canary for 5 minutes (10 checks)..."
          
          PASSED=0
          for i in $(seq 1 10); do
            CANARY=$(curl -sf -o /dev/null -w "%{http_code}" "http://$EC2_IP:3003/health" || echo "000")
            PROD=$(curl -sf -o /dev/null -w "%{http_code}" "http://$EC2_IP:3000/health" || echo "000")
            
            if [ "$CANARY" = "200" ] && [ "$PROD" = "200" ]; then
              PASSED=$((PASSED + 1))
              echo "Check $i: ✅"
            else
              echo "Check $i: ⚠️ (canary=$CANARY, prod=$PROD)"
            fi
            
            [ $i -lt 10 ] && sleep 30
          done
          
          echo "Health checks: $PASSED/10 passed"
          
          if [ $PASSED -ge 8 ]; then
            echo "✅ Auto-promoting to 100%..."
            
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
              set -e
              
              # Stop old production
              docker stop $CONTAINER || true
              docker rm $CONTAINER || true
              
              # Keep canary running! (don't stop/remove)
              
              # Deploy new version to production port
              docker run -d --restart always -p $PORT:3000 \
                -e ENVIRONMENT=$ENV \
                -e VERSION=$IMAGE_TAG \
                -e GIT_SHA=$GIT_SHA \
                --name $CONTAINER \
                317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
              
              # Reload nginx
              sudo systemctl reload nginx
              
              docker ps --filter "name=app-"
            EOF
            
            echo "🎉 PROMOTION COMPLETE!"
            echo "   - Port 3000: NEW version (100%)"
            echo "   - Port 3003: Canary still running (X-Canary: 1 header)"
          else
            echo "⚠️ Not enough checks passed. Canary stays at 10%."
          fi

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Rolling back canary..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop app-canary || true; docker rm app-canary || true"
          echo "Canary rolled back."

  # Manual Promote Job
  promote-canary:
    runs-on: ubuntu-latest
    needs: [get-version, canary-deploy]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'promote-canary'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key (once)
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Promote
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PORT: ${{ needs.get-version.outputs.port }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
          ENV: ${{ needs.get-version.outputs.environment }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP << 'EOF'
            set -e
            
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true
            docker stop app-canary || true
            docker rm app-canary || true
            
            docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=$ENV \
              -e VERSION=$IMAGE_TAG \
              -e GIT_SHA=$GIT_SHA \
              --name $CONTAINER \
              317287357166.dkr.ecr.ap-south-1.amazonaws.com/devops-app-repo:$IMAGE_TAG
              
            sudo systemctl reload nginx
            docker ps --filter "name=app-"
          EOF
          echo "🎉 Manual promotion complete!"

  # Rollback Job
  rollback:
    runs-on: ubuntu-latest
    needs: [get-version]
    if: github.event_name == 'repository_dispatch' && github.event.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key (once)
        run: |
          mkdir -p /tmp
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

      - name: Rollback
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          CONTAINER: ${{ needs.get-version.outputs.container_name }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker stop app-canary || true; docker rm app-canary || true; docker start $CONTAINER || true"
          echo "Rollback complete."

  # Slack Notification
  notify:
    runs-on: ubuntu-latest
    needs: [get-version, deploy, canary-deploy]
    if: always()
    steps:
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK
        run: |
          STATUS="${{ job.status }}"
          BRANCH="${{ needs.get-version.outputs.branch }}"
          ENV="${{ needs.get-version.outputs.environment }}"
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deployment $STATUS to $ENV ($BRANCH)\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
