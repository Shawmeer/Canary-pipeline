name: Deploy to EC2

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            VERSION="latest"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            VERSION="staging"
          else
            VERSION="dev"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      scan-passed: ${{ steps.trivy.outputs.scan-passed }}
    env:
      IMAGE_TAG: ${{ needs.get-version.outputs.version }}
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        id: trivy

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job
  build-and-push:
    runs-on: ubuntu-latest
    needs: [get-version, security-scan]
    env:
      IMAGE_TAG: ${{ needs.get-version.outputs.version }}
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}

      - name: Push Docker Image
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}

      - name: Create Deployment Info
        run: |
          cat > deployment-info.json << EOF
          {
            "version": "${{ needs.get-version.outputs.version }}",
            "git_sha": "${{ needs.get-version.outputs.git_sha }}",
            "git_short": "${{ needs.get-version.outputs.git_short }}",
            "branch": "${{ needs.get-version.outputs.branch }}",
            "ecr_repo": "${{ env.ECR_REPO }}",
            "image_tag": "${{ env.IMAGE_TAG }}",
            "image_url": "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          }
          EOF

      - name: Upload Deployment Info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ needs.get-version.outputs.branch }}
          path: deployment-info.json
          retention-days: 30

  # Deploy Job
  deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    environment:
      name: ${{ needs.get-version.outputs.branch == 'main' && 'production' || needs.get-version.outputs.branch == 'staging' && 'staging' || 'development' }}
    env:
      IMAGE_TAG: ${{ needs.get-version.outputs.version }}
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          BRANCH: ${{ needs.get-version.outputs.branch }}
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

          if [ "$BRANCH" = "main" ]; then
            ENV_NAME="production"; PORT="3000"; CONTAINER_NAME="app-prod"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_NAME="staging"; PORT="3001"; CONTAINER_NAME="app-staging"
          else
            ENV_NAME="development"; PORT="3002"; CONTAINER_NAME="app-dev"
          fi

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo bash -c 'ECR_REGISTRY=${{ env.ECR_REGISTRY }} && \
            ECR_REPO=${{ env.ECR_REPO }} && \
            IMAGE_TAG=${{ env.IMAGE_TAG }} && \
            ENVIRONMENT=$ENV_NAME && \
            PORT=$PORT && \
            CONTAINER_NAME=$CONTAINER_NAME && \
            VERSION=${{ env.VERSION }} && \
            GIT_SHA=${{ env.GIT_SHA }} && \
            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG && \
            docker stop $CONTAINER_NAME || true && \
            docker rm $CONTAINER_NAME || true && \
            docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=\$ENVIRONMENT \
              -e VERSION=\$VERSION \
              -e GIT_SHA=\$GIT_SHA \
              --name $CONTAINER_NAME $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG'"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep app"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          BRANCH: ${{ needs.get-version.outputs.branch }}
          ENVIRONMENT: ${{ needs.get-version.outputs.branch == 'main' && 'production' || needs.get-version.outputs.branch == 'staging' && 'staging' || 'development' }}
          VERSION: ${{ needs.get-version.outputs.version }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Deployment $STATUS to $ENVIRONMENT for $GITHUB_REPOSITORY\\nBranch: $BRANCH\\nVersion: $VERSION\\nGit SHA: $GIT_SHA\"}" \
              "$SLACK_WEBHOOK"
          else
            echo "SLACK_WEBHOOK not configured, skipping notification"
          fi
