name: Deploy to EC2

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      scan-passed: ${{ steps.trivy.outputs.scan-passed }}
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      # Build or pull based on branch
      - name: Build or Pull Image for Scan
        run: |
          BRANCH="${{ needs.get-version.outputs.branch }}"
          GIT_SHA="${{ env.GIT_SHA }}"
          
          if [ "$BRANCH" = "dev" ]; then
            # Build from scratch for dev
            docker build -t ${{ env.ECR_REPO }}:dev .
            docker tag ${{ env.ECR_REPO }}:dev \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:dev
            docker tag ${{ env.ECR_REPO }}:dev \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA
          else
            # Pull existing image for staging/prod promotion
            SOURCE_TAG="$([ "$BRANCH" = "staging" ] && echo "dev" || echo "staging")"
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA || \
              docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG
            docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA
          fi

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        id: trivy

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job with Image Promotion
  build-and-push:
    runs-on: ubuntu-latest
    needs: [get-version, security-scan]
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build or Promote Image
        run: |
          BRANCH="${{ env.BRANCH }}"
          GIT_SHA="${{ env.GIT_SHA }}"
          ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          
          if [ "$BRANCH" = "dev" ]; then
            echo "Building new image for dev branch..."
            docker build -t $ECR_REPO:dev .
            docker tag $ECR_REPO:dev $ECR_REGISTRY/$ECR_REPO:dev
            docker tag $ECR_REPO:dev $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
            docker push $ECR_REGISTRY/$ECR_REPO:dev
            docker push $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
            
          elif [ "$BRANCH" = "staging" ]; then
            echo "Promoting dev image to staging..."
            # Pull the exact SHA image from dev
            docker pull $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
            docker tag $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA $ECR_REGISTRY/$ECR_REPO:staging
            docker push $ECR_REGISTRY/$ECR_REPO:staging
            
          else
            echo "Promoting staging image to production..."
            # Pull the exact SHA image from staging
            docker pull $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
            docker tag $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA $ECR_REGISTRY/$ECR_REPO:latest
            docker push $ECR_REGISTRY/$ECR_REPO:latest
          fi

      - name: Create Deployment Info
        run: |
          cat > deployment-info.json << EOF
          {
            "git_sha": "${{ needs.get-version.outputs.git_sha }}",
            "git_short": "${{ needs.get-version.outputs.git_short }}",
            "branch": "${{ needs.get-version.outputs.branch }}",
            "ecr_repo": "${{ env.ECR_REPO }}",
            "image_url": "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.get-version.outputs.branch == 'main' && 'latest' || needs.get-version.outputs.branch }}"
          }
          EOF

      - name: Upload Deployment Info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ needs.get-version.outputs.branch }}
          path: deployment-info.json
          retention-days: 30

  # Deploy Job
  deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    environment:
      name: ${{ needs.get-version.outputs.branch == 'main' && 'production' || needs.get-version.outputs.branch == 'staging' && 'staging' || 'development' }}
    env:
      IMAGE_TAG: ${{ needs.get-version.outputs.branch == 'main' && 'latest' || needs.get-version.outputs.branch }}
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      VERSION: ${{ needs.get-version.outputs.branch == 'main' && 'latest' || needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          BRANCH: ${{ needs.get-version.outputs.branch }}
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

          if [ "$BRANCH" = "main" ]; then
            ENV_NAME="production"; PORT="3000"; CONTAINER_NAME="app-prod"; IMAGE_TAG="latest"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_NAME="staging"; PORT="3001"; CONTAINER_NAME="app-staging"; IMAGE_TAG="staging"
          else
            ENV_NAME="development"; PORT="3002"; CONTAINER_NAME="app-dev"; IMAGE_TAG="dev"
          fi

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo bash -c 'ECR_REGISTRY=${{ env.ECR_REGISTRY }} && \
            ECR_REPO=${{ env.ECR_REPO }} && \
            IMAGE_TAG=$IMAGE_TAG && \
            ENVIRONMENT=$ENV_NAME && \
            PORT=$PORT && \
            CONTAINER_NAME=$CONTAINER_NAME && \
            VERSION=${{ env.VERSION }} && \
            GIT_SHA=${{ env.GIT_SHA }} && \
            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG && \
            docker stop $CONTAINER_NAME || true && \
            docker rm $CONTAINER_NAME || true && \
            docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=\$ENVIRONMENT \
              -e VERSION=\$VERSION \
              -e GIT_SHA=\$GIT_SHA \
              --name $CONTAINER_NAME $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG'"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep app"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          BRANCH: ${{ needs.get-version.outputs.branch }}
          ENVIRONMENT: ${{ needs.get-version.outputs.branch == 'main' && 'production' || needs.get-version.outputs.branch == 'staging' && 'staging' || 'development' }}
          VERSION: ${{ needs.get-version.outputs.branch == 'main' && 'latest' || needs.get-version.outputs.branch }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Deployment $STATUS to $ENVIRONMENT for $GITHUB_REPOSITORY\\nBranch: $BRANCH\\nVersion: $VERSION\\nGit SHA: $GIT_SHA\"}" \
              "$SLACK_WEBHOOK"
          else
            echo "SLACK_WEBHOOK not configured, skipping notification"
          fi
