name: Deploy to EC2

on:
  push:
    branches:
      - main
      - dev
      - staging
  repository_dispatch:
    types:
      - deploy
      - deploy_dev
      - deploy_staging

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 317287357166.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: devops-app-repo

jobs:
  # Get version info
  get-version:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.version.outputs.git_sha }}
      git_short: ${{ steps.version.outputs.git_short }}
      branch: ${{ github.ref_name }}
      # Environment mapping
      image_tag: ${{ steps.env.outputs.image_tag }}
      container_name: ${{ steps.env.outputs.container_name }}
      port: ${{ steps.env.outputs.port }}
      environment: ${{ steps.env.outputs.environment }}
      source_tag: ${{ steps.env.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          GIT_SHA="${{ github.sha }}"
          GIT_SHORT="${GIT_SHA:0:7}"
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          echo "git_short=$GIT_SHORT" >> $GITHUB_OUTPUT

      - name: Set environment variables
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          
          case "$BRANCH" in
            main)
              echo "image_tag=latest" >> $GITHUB_OUTPUT
              echo "container_name=app-prod" >> $GITHUB_OUTPUT
              echo "port=3000" >> $GITHUB_OUTPUT
              echo "environment=production" >> $GITHUB_OUTPUT
              echo "source_tag=staging" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "image_tag=staging" >> $GITHUB_OUTPUT
              echo "container_name=app-staging" >> $GITHUB_OUTPUT
              echo "port=3001" >> $GITHUB_OUTPUT
              echo "environment=staging" >> $GITHUB_OUTPUT
              echo "source_tag=dev" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "image_tag=dev" >> $GITHUB_OUTPUT
              echo "container_name=app-dev" >> $GITHUB_OUTPUT
              echo "port=3002" >> $GITHUB_OUTPUT
              echo "environment=development" >> $GITHUB_OUTPUT
              echo "source_tag=" >> $GITHUB_OUTPUT
              ;;
          esac

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      scan-passed: ${{ steps.trivy.outputs.scan-passed }}
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.get-version.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      # Build or pull image for scanning
      - name: Prepare Image for Scan
        run: |
          BRANCH="${{ needs.get-version.outputs.branch }}"
          GIT_SHA="${{ env.GIT_SHA }}"
          SOURCE_TAG="${{ env.SOURCE_TAG }}"
          
          if [ -z "$SOURCE_TAG" ]; then
            # Build for dev (no source)
            docker build -t ${{ env.ECR_REPO }}:dev .
          else
            # Pull promoted image for staging/prod
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$SOURCE_TAG || \
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA
          fi
          
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}/${{ env.ECR_REPO }}:$SOURCE_TAG \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-$GIT_SHA 2>/dev/null || true

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scanners: vuln
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:sha-${{ env.GIT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        id: trivy
        continue-on-error: true

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ needs.get-version.outputs.branch }}
          path: trivy-results.sarif
          retention-days: 30

  # Build and Push Job with Image Promotion
  build-and-push:
    runs-on: ubuntu-latest
    needs: [get-version, security-scan]
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.get-version.outputs.source_tag }}
      BRANCH: ${{ needs.get-version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build or Promote Image
        run: |
          BRANCH="${{ env.BRANCH }}"
          GIT_SHA="${{ env.GIT_SHA }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          SOURCE_TAG="${{ env.SOURCE_TAG }}"
          ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          
          if [ -z "$SOURCE_TAG" ]; then
            # Build new image for dev
            echo "Building new image for dev..."
            docker build -t $ECR_REPO:$IMAGE_TAG .
            docker tag $ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
            docker tag $ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
          else
            # Promote image from source environment
            echo "Promoting from $SOURCE_TAG to $IMAGE_TAG..."
            
            # Try to pull by SHA first, then source tag
            if ! docker pull $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA 2>/dev/null; then
              echo "SHA not found, using $SOURCE_TAG tag"
              docker pull $ECR_REGISTRY/$ECR_REPO:$SOURCE_TAG
              docker tag $ECR_REGISTRY/$ECR_REPO:$SOURCE_TAG $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
              docker push $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA
            fi
            
            # Tag for target environment
            docker tag $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          fi
          
          # Push all tags
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:sha-$GIT_SHA

      - name: Create Deployment Info
        run: |
          cat > deployment-info.json << EOF
          {
            "git_sha": "${{ needs.get-version.outputs.git_sha }}",
            "git_short": "${{ needs.get-version.outputs.git_short }}",
            "branch": "${{ needs.get-version.outputs.branch }}",
            "image_tag": "${{ needs.get-version.outputs.image_tag }}",
            "ecr_repo": "${{ env.ECR_REPO }}",
            "image_url": "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ needs.get-version.outputs.image_tag }}"
          }
          EOF

      - name: Upload Deployment Info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ needs.get-version.outputs.branch }}
          path: deployment-info.json
          retention-days: 30

  # Deploy Job
  deploy:
    runs-on: ubuntu-latest
    needs: [get-version, build-and-push]
    environment:
      name: ${{ needs.get-version.outputs.environment }}
    env:
      GIT_SHA: ${{ needs.get-version.outputs.git_short }}
      VERSION: ${{ needs.get-version.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          CONTAINER_NAME: ${{ needs.get-version.outputs.container_name }}
          PORT: ${{ needs.get-version.outputs.port }}
          IMAGE_TAG: ${{ needs.get-version.outputs.image_tag }}
          ENV_NAME: ${{ needs.get-version.outputs.environment }}
        run: |
          mkdir -p /tmp
          echo "$PRIVATE_KEY" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "sudo bash -c ' \
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG && \
            docker stop $CONTAINER_NAME || true && \
            docker rm $CONTAINER_NAME || true && \
            docker run -d --restart always -p $PORT:3000 \
              -e ENVIRONMENT=\$ENV_NAME \
              -e VERSION=\$VERSION \
              -e GIT_SHA=\$GIT_SHA \
              --name $CONTAINER_NAME \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$IMAGE_TAG'"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/private_key.pem ubuntu@$EC2_IP \
            "docker ps | grep app"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          BRANCH: ${{ needs.get-version.outputs.branch }}
          ENVIRONMENT: ${{ needs.get-version.outputs.environment }}
          VERSION: ${{ needs.get-version.outputs.image_tag }}
          GIT_SHA: ${{ needs.get-version.outputs.git_short }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Deployment $STATUS to $ENVIRONMENT for $GITHUB_REPOSITORY\\nBranch: $BRANCH\\nVersion: $VERSION\\nGit SHA: $GIT_SHA\"}" \
              "$SLACK_WEBHOOK"
          else
            echo "SLACK_WEBHOOK not configured, skipping notification"
          fi
