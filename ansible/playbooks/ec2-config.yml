---
# EC2 Configuration Playbook
# Installs Docker, Nginx, AWS CLI on EC2 for CI/CD pipeline

- name: Configure EC2 for CI/CD Pipeline
  hosts: webservers
  become: yes
  gather_facts: yes

  vars:
    nginx_config_path: ../nginx/nginx.conf

  tasks:
    # Update apt cache
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # Install prerequisites
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - unzip
        state: present

    # Add Docker GPG key
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    # Add Docker repository
    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    # Install Docker
    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    # Start and enable Docker
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    # Add ubuntu user to docker group
    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # Install AWS CLI v2
    - name: Download AWS CLI v2
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'

    - name: Unzip AWS CLI
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: yes
        creates: /tmp/aws

    - name: Install AWS CLI
      command: /tmp/aws/install
      args:
        creates: /usr/local/bin/aws

    - name: Clean up AWS CLI install files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws

    # Install Nginx
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    # Start and enable Nginx
    - name: Start Nginx service
      service:
        name: nginx
        state: started
        enabled: yes

    # Copy Nginx configuration
    - name: Create nginx config directory
      file:
        path: /etc/nginx/sites-available
        state: directory

    - name: Deploy Nginx configuration
      copy:
        src: "{{ nginx_config_path }}"
        dest: /etc/nginx/nginx.conf
        mode: '0644'
      notify: Reload Nginx

    # Test Nginx configuration
    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false

    # Install jq for JSON processing
    - name: Install jq
      apt:
        name: jq
        state: present

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded