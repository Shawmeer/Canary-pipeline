# Development Server Config
# Domain: https://devops-dev.khanalsamir.com/
# Backend: Container on port 3002

server {
    listen 80;
    server_name devops-dev.khanalsamir.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name devops-dev.khanalsamir.com;

    # SSL configuration (paths to certificates)
    ssl_certificate /etc/letsencrypt/live/devops-dev.khanalsamir.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-dev.khanalsamir.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:3002/health;
    }
}