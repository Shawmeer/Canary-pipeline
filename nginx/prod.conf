# =============================================================================
# Production Nginx Configuration with SSL & Canary Support
# Domain: https://devops-prod.khanalsamir.com
# Production Backend: 127.0.0.1:3000
# Canary Backend: 127.0.0.1:3003
# =============================================================================

# Upstream backends
upstream production_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream canary_backend {
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name devops-prod.khanalsamir.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server - Production with Canary Support
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devops-prod.khanalsamir.com;

    # -----------------------------------------------------------------------------
    # SSL Configuration (matching Certbot)
    # -----------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/devops-staging.khanalsamir.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-staging.khanalsamir.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -----------------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -----------------------------------------------------------------------------
    # Main Application Route with Canary Logic
    # -----------------------------------------------------------------------------
    location / {
        # Method 1: Header-based canary override
        # Usage: curl -H "X-Canary: 1" https://devops-prod.khanalsamir.com/
        if ($http_x_canary = "1") {
            proxy_pass http://canary_backend;
            break;
        }

        # Method 2: Cookie-based canary override
        # Usage: curl -b "canary=yes" https://devops-prod.khanalsamir.com/
        if ($http_cookie ~* "canary=yes") {
            proxy_pass http://canary_backend;
            break;
        }

        # Method 3: Percentage-based canary (~10% traffic)
        # Uses IP hash for consistent routing
        set $canary_weight 0;
        set $client_ip_hash 0;

        # Simple hash based on last octet
        if ($remote_addr ~ "^(\d+)\.(\d+)\.(\d+)\.(\d+)$") {
            set $client_ip_hash $4;
        }

        # If hash ends in 0-9 (10% of IPs), route to canary
        if ($client_ip_hash ~ "^[0-9]$") {
            set $canary_weight 1;
        }

        if ($canary_weight = 1) {
            proxy_pass http://canary_backend;
            break;
        }

        # Default: Production (90%)
        proxy_pass http://production_backend;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Canary-Version "production";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # HTTP/1.1 for keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Canary Endpoint - Always routes to canary
    # -----------------------------------------------------------------------------
    location /canary {
        proxy_pass http://canary_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Canary-Version "canary";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Health Check Endpoints
    # -----------------------------------------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://production_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /canary-health {
        access_log off;
        proxy_pass http://canary_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Metrics Endpoint (Prometheus compatible)
    # -----------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://production_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
