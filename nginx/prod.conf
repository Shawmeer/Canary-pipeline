# =============================================================================
# Production Nginx Configuration with Dynamic Canary Support
# Domain: https://devops-prod.khanalsamir.com
# Production Backend: 127.0.0.1:3000
# Canary Backend: 127.0.0.1:3003
# Dynamic canary config: /home/ubuntu/canary-weight.conf
# =============================================================================

# Load dynamic canary percentage (default: 0 = 0% to canary)
# This file is created/updated by update-canary-weight.sh
map $remote_addr $canary_percentage {
    default 0;
    include /home/ubuntu/canary-weight.conf;
}

# Upstream backends
upstream production_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream canary_backend {
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name devops-prod.khanalsamir.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server - Production with Dynamic Canary Support
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devops-prod.khanalsamir.com;

    # -----------------------------------------------------------------------------
    # SSL Configuration
    # -----------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/devops-staging.khanalsamir.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-staging.khanalsamir.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -----------------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -----------------------------------------------------------------------------
    # Main Application Route with Dynamic Canary
    # -----------------------------------------------------------------------------
    location / {
        # Method 1: Header-based canary override (for testing)
        # Usage: curl -H "X-Canary: 1" https://devops-prod.khanalsamir.com/
        if ($http_x_canary = "1") {
            proxy_pass http://canary_backend;
            break;
        }

        # Method 2: Cookie-based canary override
        # Usage: curl -b "canary=yes" https://devops-prod.khanalsamir.com/
        if ($http_cookie ~* "canary=yes") {
            proxy_pass http://canary_backend;
            break;
        }

        # Method 3: Dynamic percentage-based canary routing
        # Uses $canary_percentage from map (loaded from canary-weight.conf)
        
        # Calculate threshold: IP last octet (0-255) < (percentage * 2.55)
        set $route_to_canary 0;
        
        # Get last octet of IP
        set $ip_last_octet 0;
        if ($remote_addr ~ "^.*\.(\d+)$") {
            set $ip_last_octet $1;
        }
        
        # Route to canary if percentage > 0 and ip matches threshold
        # For 10%: ips 0-25 (10% of 255)
        # For 20%: ips 0-51 (20% of 255)
        # For 40%: ips 0-102
        # For 60%: ips 0-153
        # For 80%: ips 0-204
        # For 100%: all ips
        
        if ($canary_percentage > 0) {
            # Use simple range matching for each percentage level
            set $route_to_canary 0;
            
            # 10%: last octet 0-25
            if ($ip_last_octet ~ "^(0|[1-2]?[0-9])$") {
                set $route_to_canary 1;
            }
            # Extend for 20%: 0-51
            if ($ip_last_octet ~ "^([3-4]?[0-9]|5[0-1])$") {
                set $route_to_canary 1;
            }
            # Extend for 40%: 0-102
            if ($ip_last_octet ~ "^([5-6]?[0-9]|7[0-2])$") {
                set $route_to_canary 1;
            }
            # Extend for 60%: 0-153
            if ($ip_last_octet ~ "^([7-8]?[0-9]|9[0-3])$") {
                set $route_to_canary 1;
            }
            # Extend for 80%: 0-204
            if ($ip_last_octet ~ "^([9][4-9]|[1-2]?[0-9]{2})$") {
                set $route_to_canary 1;
            }
        }
        
        if ($canary_percentage = 100) {
            set $route_to_canary 1;
        }
        
        # Route based on $route_to_canary
        if ($route_to_canary = 1) {
            proxy_pass http://canary_backend;
            set $header_canary "canary";
        }
        
        if ($route_to_canary = 0) {
            proxy_pass http://production_backend;
            set $header_canary "production";
        }

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Canary-Version $header_canary always;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # HTTP/1.1 for keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Canary Endpoint - Always routes to canary (for testing)
    # -----------------------------------------------------------------------------
    location /canary {
        proxy_pass http://canary_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Canary-Version "canary";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Health Check Endpoints
    # -----------------------------------------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://production_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /canary-health {
        access_log off;
        proxy_pass http://canary_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Canary Status Endpoint - Shows current canary percentage
    # -----------------------------------------------------------------------------
    location /canary-status {
        default_type application/json;
        set $status "ok";
        if ($canary_percentage = 0) {
            set $status "no-canary";
        }
        return 200 '{"canary_percentage":$canary_percentage,"status":"$status","timestamp":"$time_iso8601"}';
    }

    # -----------------------------------------------------------------------------
    # Metrics Endpoint
    # -----------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://production_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
