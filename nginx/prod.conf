# Production Server Config with Canary Support
# Domain: https://devops-prod.khanalsamir.com/
# Production Backend: Container on port 3000
# Canary Backend: Container on port 3003

# Upstream backends
upstream production_backend {
    server 127.0.0.1:3000;
}

upstream canary_backend {
    server 127.0.0.1:3003;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name devops-prod.khanalsamir.com;

    return 301 https://$server_name$request_uri;
}

# Production HTTPS with Canary Traffic Split
server {
    listen 443 ssl http2;
    server_name devops-prod.khanalsamir.com;

    # SSL configuration (paths to certificates)
    ssl_certificate /etc/letsencrypt/live/devops-prod.khanalsamir.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-prod.khanalsamir.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    # Canary routing logic
    # Default: 90% production, 10% canary
    # Use header "X-Canary: 1" to force canary route
    set $canary_weight 0;
    
    location / {
        # Check for manual canary override via header
        if ($http_x_canary = "1") {
            proxy_pass http://canary_backend;
        }
        
        # A/B testing: approximately 10% traffic to canary
        # Use consistent hashing for stable routing
        if ($http_cookie ~* "canary=1") {
            proxy_pass http://canary_backend;
        }
        
        # Default to production (90% of traffic)
        proxy_pass http://production_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Canary-Version "production";
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Health check for production
    location /health {
        access_log off;
        proxy_pass http://production_backend/health;
    }

    # Canary-specific health check
    location /canary-health {
        access_log off;
        proxy_pass http://canary_backend/health;
    }

    # Metrics endpoint
    location /metrics {
        proxy_pass http://production_backend/metrics;
    }
}

