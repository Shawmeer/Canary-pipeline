# Canary server block - add this to your nginx config
# This allows traffic splitting between production and canary

server {
    server_name canary.devops-prod.khanalsamir.com;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Add header to identify canary requests
        proxy_set_header X-Canary "true";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3003/health;
        proxy_http_version 1.1;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/devops-prod.khanalsamir.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-prod.khanalsamir.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

