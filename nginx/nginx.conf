user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Upstream backends
    upstream production {
        server 127.0.0.1:3000;
    }

    upstream canary {
        server 127.0.0.1:3003;
    }

    # Default: all traffic to production
    server {
        listen 80;
        server_name _;

        location / {
            # Canary percentage - adjust to split traffic
            # Example: 10% goes to canary, 90% to production
            set $target production;
            
            # Use $http_x_canary_header for manual override
            # Set header "X-Canary: 1" to force canary
            if ($http_x_canary = "1") {
                set $target canary;
            }

            # Random weighted routing (approximate)
            # Uncomment for percentage-based routing:
            # set $random_weight $string;
            # if ($random_weight ~* "^([0-9]+)$") {
            #     set $target production;
            # }

            proxy_pass http://$target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health check path
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://production/metrics;
        }
    }

    # Production stats (optional)
    server {
        listen 8080;
        server_name _;
        
        location / {
            proxy_pass http://production;
            proxy_set_header Host $host;
        }
    }
}
